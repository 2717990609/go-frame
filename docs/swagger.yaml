basePath: /api/v1
definitions:
  fire-mirage_internal_dto.HealthResponse:
    properties:
      status:
        type: string
      version:
        type: string
    type: object
  fire-mirage_internal_dto.ReadyResponse:
    properties:
      details:
        additionalProperties:
          type: string
        type: object
      mysql:
        type: boolean
      ready:
        type: boolean
      redis:
        type: boolean
    type: object
  fire-mirage_pkg_response.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
      ts:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: 《星火现梦》后端 API - 符合开发规范 v1.8
  title: Fire Mirage API
  version: 0.1.0
paths:
  /health:
    get:
      description: 用于 K8s 存活探针，不检查依赖
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/fire-mirage_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/fire-mirage_internal_dto.HealthResponse'
              type: object
      summary: 存活探测
      tags:
      - 健康检查
  /ready:
    get:
      description: 用于负载均衡摘除，检查 MySQL、Redis 连通性
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/fire-mirage_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/fire-mirage_internal_dto.ReadyResponse'
              type: object
      summary: 就绪探测
      tags:
      - 健康检查
securityDefinitions:
  Bearer:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
