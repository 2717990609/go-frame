# 通用企业级Go框架配置示例
# 支持 ${VAR:default} 环境变量注入语法

# 服务器配置
server:
  port: "${SERVER_PORT:8080}"
  host: "${HOST:0.0.0.0}"
  read_timeout: "${READ_TIMEOUT:30}"    # 秒
  write_timeout: "${WRITE_TIMEOUT:30}"  # 秒
  timeout: "${TIMEOUT:30}"              # 请求超时秒
  # 服务器类型 (echo/fiber/gin/custom)
  type: "${SERVER_TYPE:gin}"

# 数据库配置 - 支持多种数据库类型
database:
  # 数据库驱动类型 (mysql/postgresql/sqlite/mongodb)
  driver: "${DB_DRIVER:mysql}"
  host: "${DB_HOST:localhost}"
  port: "${DB_PORT:3306}"
  database: "${DB_NAME:app_default}"
  username: "${DB_USER:root}"
  password: "${DB_PASSWORD:}"
  charset: "${DB_CHARSET:utf8mb4}"
  collation: "${DB_COLLATION:utf8mb4_general_ci}"
  max_open_conns: "${DB_MAX_OPEN_CONNS:10}"
  max_idle_conns: "${DB_MAX_IDLE_CONNS:5}"
  conn_max_lifetime: "${DB_CONN_MAX_LIFETIME:3600}"    # 秒
  conn_max_idle_time: "${DB_CONN_MAX_IDLE_TIME:600}"   # 秒

# 缓存配置
cache:
  # 缓存驱动 (redis/redis-cluster/memory)
  driver: "${CACHE_DRIVER:redis}"
  addr: "${REDIS_ADDR:localhost:6379}"
  password: "${REDIS_PASSWORD:}"
  db: "${REDIS_DB:0}"
  # Redis集群配置
  cluster_addrs: "${REDIS_CLUSTER_ADDRS:}"
  cluster_password: "${REDIS_CLUSTER_PASSWORD:}"

# 日志配置
log:
  output: ["${LOG_OUTPUT:stdout}"]    # stdout/file
  file_path: "${LOG_FILE_PATH:}"      # 为空则输出到stdout
  max_size: "${LOG_MAX_SIZE:100}"     # MB
  max_backups: "${LOG_MAX_BACKUPS:7}"
  max_age: "${LOG_MAX_AGE:30}"        # 天
  compress: "${LOG_COMPRESS:false}"
  enable_sql_log: "${LOG_SQL:false}"
  # 敏感字段自动脱敏
  sensitive_fields:
    - "password"
    - "token"
    - "secret"
    - "id_card"
    - "bank_card"

# JWT认证配置
jwt:
  secret: "${JWT_SECRET:your-secret-key-change-in-production}"
  expire_hour: "${JWT_EXPIRE_HOUR:168}"   # 7天
  issuer: "${JWT_ISSURE:go-backend-framework}"

# 请求签名验签配置
signature:
  enabled: "${SIGNATURE_ENABLED:false}"  # 生产环境建议开启
  key: "${SIGNATURE_KEY:your-signature-key}"
  time_window: "${SIGNATURE_TIME_WINDOW:300}"    # 时间窗口秒
  nonce_ttl: "${SIGNATURE_NONCE_TTL:10}"        # Nonce过期秒

# CORS跨域配置
cors:
  origins: "${CORS_ORIGINS:*}"
  methods: "${CORS_METHODS:GET,POST,PUT,DELETE,OPTIONS}"
  headers: "${CORS_HEADERS:*}"
  credentials: "${CORS_CREDENTIALS:false}"

# 限流配置
rate_limit:
  enabled: "${RATE_LIMIT_ENABLED:true}"
  # 全局限流配置
  global:
    requests: "${RATE_GLOBAL_REQUESTS:100}"
    window: "${RATE_GLOBAL_WINDOW:1m}"     # 时间窗口
  # 按用户限流配置
  user:
    requests: "${RATE_USER_REQUESTS:60}"
    window: "${RATE_USER_WINDOW:1m}"
  # 按IP限流配置
  ip:
    requests: "${RATE_IP_REQUESTS:30}"
    window: "${RATE_IP_WINDOW:1m}"

# 监控配置
monitoring:
  enabled: "${MONITORING_ENABLED:false}"
  # Prometheus指标
  prometheus:
    enabled: "${PROMETHEUS_ENABLED:false}"
    path: "${PROMETHEUS_PATH:/metrics}"
    port: "${PROMETHEUS_PORT:9090}"
  # Jaeger链路追踪
  tracing:
    enabled: "${TRACING_ENABLED:false}"
    jaeger:
      endpoint: "${JAEGER_ENDPOINT:http://localhost:14268/api/traces}"
      service_name: "${JAEGER_SERVICE_NAME:go-backend-framework}"

# 健康检查配置
health:
  enabled: "${HEALTH_ENABLED:true}"
  paths:
    liveness: "${HEALTH_LIVENESS:/health}"
    readiness: "${HEALTH_READINESS:/ready}"

# 插件配置
plugins:
  enabled: "${PLUGINS_ENABLED:swagger,metrics}"
  swagger:
    enabled: "${SWAGGER_ENABLED:true}"
    path: "${SWAGGER_PATH:/swagger}"
    host: "${SWAGGER_HOST:localhost:8080}"
  metrics:
    enabled: "${METRICS_ENABLED:false}"
    
# 业务配置（示例）
business:
  # 主题配置
  theme:
    name: "${APP_NAME:Go Backend Framework}"
    version: "${APP_VERSION:1.0.0}"
    description: "${APP_DESCRIPTION:企业级Go后端框架}"
  
  # 功能开关
  features:
    user_management: "${FEATURE_USER_MANAGEMENT:true}"
    admin_panel: "${FEATURE_ADMIN_PANEL:false}"
    api_docs: "${FEATURE_API_DOCS:true}"
  
  # 邮件配置
  email:
    enabled: "${EMAIL_ENABLED:false}"
    smtp_host: "${EMAIL_SMTP_HOST:smtp.example.com}"
    smtp_port: "${EMAIL_SMTP_PORT:587}"
    username: "${EMAIL_USERNAME:}"
    password: "${EMAIL_PASSWORD:}"
    from: "${EMAIL_FROM:noreply@example.com}"
  
  # 文件上传配置
  upload:
    enabled: "${UPLOAD_ENABLED:false}"
    max_size: "${UPLOAD_MAX_SIZE:10MB}"
    allowed_types: "${UPLOAD_ALLOWED_TYPES:jpg,jpeg,png,gif,pdf,doc,docx}"
    storage_path: "${UPLOAD_PATH:./uploads}"
    
# Kafka配置（可选）
kafka:
  enabled: "${KAFKA_ENABLED:false}"
  brokers: "${KAFKA_BROKERS:localhost:9092}"
  topic_prefix: "${KAFKA_TOPIC_PREFIX:go-framework}"
  consumer_group: "${KAFKA_CONSUMER_GROUP:default}"

# Elasticsearch配置（可选）
elasticsearch:
  enabled: "${ELASTICSEARCH_ENABLED:false}"
  urls: "${ELASTICSEARCH_URLS:http://localhost:9200}"
  username: "${ELASTICSEARCH_USERNAME:}"
  password: "${ELASTICSEARCH_PASSWORD:}"
  index_prefix: "${ELASTICSEARCH_INDEX_PREFIX:go-framework}"