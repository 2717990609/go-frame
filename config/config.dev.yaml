# 开发环境配置 - 本地调试
# 支持环境变量注入，便于开发调试

# 服务器配置
server:
  port: "${SERVER_PORT:8823}"
  host: "${HOST:0.0.0.0}"
  read_timeout: "${READ_TIMEOUT:30}"
  write_timeout: "${WRITE_TIMEOUT:30}"
  timeout: "${TIMEOUT:30}"
  type: "${SERVER_TYPE:gin}"

# 数据库配置
mysql:
  host: "${DB_HOST:127.0.0.1}"
  port: "${DB_PORT:3306}"
  user: "${DB_USER:root}"
  password: "${DB_PASSWORD:}"
  database: "${DB_NAME:fire_mirage}"        # 开发环境数据库名
  charset: "${DB_CHARSET:utf8mb4}"
  collation: "${DB_COLLATION:utf8mb4_general_ci}"
  max_open_conns: "${DB_MAX_OPEN_CONNS:10}"
  max_idle_conns: "${DB_MAX_IDLE_CONNS:5}"

# Redis配置
redis:
  addr: "${REDIS_ADDR:127.0.0.1:6379}"
  password: "${REDIS_PASSWORD:123456}"
  db: "${REDIS_DB:0}"

# 日志配置
log:
  output: ["${LOG_OUTPUT:stdout}"]
  file_path: "${LOG_FILE_PATH:}"
  max_size: "${LOG_MAX_SIZE:100}"
  max_backups: "${LOG_MAX_BACKUPS:5}"
  max_age: "${LOG_MAX_AGE:7}"
  compress: "${LOG_COMPRESS:false}"
  enable_sql_log: "${LOG_SQL:true}"
  sensitive_fields:
    - "password"
    - "id_card"
    - "token"

# JWT配置
jwt:
  secret: "${JWT_SECRET:dev-secret-key}"
  expire_hour: "${JWT_EXPIRE_HOUR:168}"
  issuer: "${JWT_ISSURE:go-backend-framework-dev}"

# 请求签名配置
signature:
  enabled: "${SIGNATURE_ENABLED:false}"  # 开发环境可关闭，方便调试
  key: "${SIGNATURE_KEY:dev-signature-key}"
  time_window: "${SIGNATURE_TIME_WINDOW:300}"
  nonce_ttl: "${SIGNATURE_NONCE_TTL:10}"

# CORS配置
cors:
  origins: "${CORS_ORIGINS:*}"
  methods: "${CORS_METHODS:*}"
  headers: "${CORS_HEADERS:*}"
  credentials: "${CORS_CREDENTIALS:true}"

# 限流配置
rate_limit:
  enabled: "${RATE_LIMIT_ENABLED:false}"  # 开发环境可以关闭
  global:
    requests: "${RATE_GLOBAL_REQUESTS:1000}"
    window: "${RATE_GLOBAL_WINDOW:1m}"

# 业务配置
business:
  theme:
    name: "${APP_NAME:Go Backend Framework}"
    version: "${APP_VERSION:1.0.0}"
    description: "${APP_DESCRIPTION:企业级Go后端框架 - 开发环境}"
    
  features:
    user_management: "${FEATURE_USER_MANAGEMENT:true}"
    admin_panel: "${FEATURE_ADMIN_PANEL:true}"
    api_docs: "${FEATURE_API_DOCS:true}"

# 监控配置 (开发环境可选)
monitoring:
  enabled: "${MONITORING_ENABLED:false}"
  prometheus:
    enabled: "${PROMETHEUS_ENABLED:false}"
    path: "${PROMETHEUS_PATH:/metrics}"
  tracing:
    enabled: "${TRACING_ENABLED:false}"

# 插件配置
plugins:
  enabled: "${PLUGINS_ENABLED:mysql,redis,swagger}"
  swagger:
    enabled: "${SWAGGER_ENABLED:true}"
    path: "${SWAGGER_PATH:/swagger}"
    host: "${SWAGGER_HOST:localhost:8823}"

# 健康检查配置
health:
  enabled: "${HEALTH_ENABLED:true}"
  paths:
    liveness: "${HEALTH_LIVENESS:/health}"
    readiness: "${HEALTH_READINESS:/ready}"