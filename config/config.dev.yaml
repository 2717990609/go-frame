# 开发环境配置 - 本地调试
# 需本地启动 MySQL 和 Redis，或使用 Docker

server:
  port: 8823
  read_timeout: 30
  write_timeout: 30
  timeout: 30

mysql:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""
  database: "fire_mirage"
  charset: "utf8mb4"
  collation: "utf8mb4_general_ci"
  max_open_conns: 10
  max_idle_conns: 5

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

log:
  output: ["stdout"]
  file_path: ""
  max_size: 100
  max_backups: 5
  max_age: 7
  compress: false
  enable_sql_log: true
  sensitive_fields:
    - password
    - id_card

jwt:
  secret: "qwasezdrftgyhujikolp"
  expire_hour: 168

signature:
  enabled: false  # 开发环境可关闭，方便调试
  key: "1asw3e4r6t7y8u9i0o"
  time_window: 300
  nonce_ttl: 10

cors:
  - "*"
